<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velora - Sign In</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at top, #1e0b36 0%, #0c0418 60%, #05010a 100%);
            --bg-color: #0c0418;
            --card-bg: rgba(28, 12, 59, 0.45);
            --card-border: rgba(168, 85, 247, 0.18);
            --card-border-hover: rgba(168, 85, 247, 0.35);
            --text-main: #f3f4f6;
            --text-muted: #a78bfa;
            --color-primary: #a855f7;
            --color-primary-rgb: 168, 85, 247;
            --color-primary-hover: #c084fc;
            --glow-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
            --shadow-main: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            --input-bg: rgba(17, 7, 30, 0.6);
            --button-danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Keyboard Focus Accessibility */
        *:focus-visible {
            outline: 2px solid var(--color-primary) !important;
            outline-offset: 3px !important;
        }

        /* Targeted Transitions for Performance */
        .btn-submit, .input-field, .remember-me-checkbox, .auth-footer a {
            transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
        }

        .glass-card {
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding: 20px;
        }

        /* Ambient background glow elements */
        .glow-blob {
            position: absolute;
            width: 450px;
            height: 450px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(var(--color-primary-rgb), 0.15) 0%, rgba(0,0,0,0) 70%);
            filter: blur(40px);
            z-index: -1;
            pointer-events: none;
            animation: float-slow 18s infinite alternate ease-in-out;
        }
        .glow-blob-1 { top: 10%; left: -10%; }
        .glow-blob-2 { bottom: 10%; right: -10%; animation-delay: -6s; }

        @keyframes float-slow {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -50px) scale(1.1); }
            100% { transform: translate(-20px, 30px) scale(0.9); }
        }

        canvas#particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 10;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 30px 24px;
            box-shadow: var(--shadow-main);
            transition: border-color 0.3s ease;
        }
        .glass-card:hover {
            border-color: var(--card-border-hover);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .auth-header i {
            color: var(--color-primary);
            filter: drop-shadow(0 0 8px var(--color-primary));
            margin-bottom: 12px;
            width: 40px;
            height: 40px;
        }
        .auth-header h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .auth-header p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }
        .form-group label {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .input-field {
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 10px 12px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            width: 100%;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .input-field:focus {
            border-color: var(--color-primary);
        }

        .remember-forgot {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 0.8rem;
        }
        .remember-me-label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            cursor: pointer;
        }
        .remember-me-checkbox {
            accent-color: var(--color-primary);
            cursor: pointer;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--color-primary) 0%, #8b5cf6 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            width: 100%;
            box-shadow: var(--glow-shadow);
            transition: opacity 0.2s, transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-submit:hover {
            transform: translateY(-1px);
            opacity: 0.95;
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .auth-footer a {
            color: var(--color-primary-hover);
            text-decoration: none;
            font-weight: 500;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }

        .alert-box {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid var(--button-danger);
            color: #fca5a5;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="glow-blob glow-blob-1"></div>
    <div class="glow-blob glow-blob-2"></div>
    <canvas id="particleCanvas"></canvas>

    <div class="auth-container">
        <div class="glass-card">
            <div class="auth-header">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 40px; height: 40px; color: var(--color-primary); filter: drop-shadow(0 0 8px var(--color-primary)); margin-bottom: 12px; display: inline-block;">
                    <path d="M4 4.5L12 20L20 4.5" />
                </svg>
                <h2>Sign In to Velora</h2>
                <p style="font-weight: 600; letter-spacing: 1px; text-transform: uppercase; font-size: 0.75rem; color: var(--color-primary); margin-top: -2px; margin-bottom: 8px;">Focus. Track. Achieve.</p>
                <p>Welcome back! Let's resume focusing.</p>
            </div>

            <!-- Error displays -->
            {% if messages %}
                {% for message in messages %}
                    <div class="alert-box">
                        <i data-lucide="alert-circle" style="width: 16px; height: 16px; flex-shrink: 0;"></i>
                        <span>{{ message }}</span>
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username_or_email">Username or Email</label>
                    <input type="text" id="username_or_email" name="username_or_email" class="input-field" placeholder="Enter username or email" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="input-field" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <div class="remember-forgot">
                    <label class="remember-me-label">
                        <input type="checkbox" name="remember_me" class="remember-me-checkbox">
                        Remember Me
                    </label>
                </div>

                <button type="submit" class="btn-submit">
                    Sign In <i data-lucide="arrow-right" style="width: 16px; height: 16px;"></i>
                </button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="{% url 'signup' %}">Sign Up</a>
            </div>
        </div>
    </div>

    <!-- Sparks logic -->
    <script>
        lucide.createIcons();

        // Particles Animation
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                resizeCanvas();
                initParticles();
            }, 150);
        });
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.speedY = Math.random() * 0.4 - 0.2;
                this.opacity = Math.random() * 0.5 + 0.1;
                this.pulseSpeed = Math.random() * 0.02 + 0.005;
                this.pulseDir = 1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                // Loop edges
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;

                // Pulsate opacity
                this.opacity += this.pulseSpeed * this.pulseDir;
                if (this.opacity > 0.8 || this.opacity < 0.1) {
                    this.pulseDir *= -1;
                }
            }
            draw() {
                ctx.fillStyle = `rgba(168, 85, 247, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            const count = Math.floor((canvas.width * canvas.height) / 18000);
            particles = [];
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }
        initParticles();

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
